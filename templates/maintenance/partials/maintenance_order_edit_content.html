{% load djicons i18n %}
<div data-back-url="{% url 'maintenance:maintenance_orders_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Maintenanceorder" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'maintenance:maintenance_orders_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-maintenance_order-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-maintenance_order-form"
          hx-post="{% url 'maintenance:maintenance_order_edit' obj.id %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Reference" %}</label>
                <input type="text" name="reference" class="input input-sm w-full" value="{{ obj.reference }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Title" %}</label>
                <input type="text" name="title" class="input input-sm w-full" value="{{ obj.title }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Description" %}</label>
                <textarea name="description" class="textarea textarea-sm w-full" rows="3">{{ obj.description }}</textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Maintenance Type" %}</label>
                <select name="maintenance_type" class="select select-sm w-full">
                <option value="">---</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Priority" %}</label>
                <input type="text" name="priority" class="input input-sm w-full" value="{{ obj.priority }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <input type="text" name="status" class="input input-sm w-full" value="{{ obj.status }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Scheduled Date" %}</label>
                <input type="date" name="scheduled_date" class="input input-sm w-full" value="{{ obj.scheduled_date }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Completed Date" %}</label>
                <input type="date" name="completed_date" class="input input-sm w-full" value="{{ obj.completed_date }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Assigned To" %}</label>
                <input type="text" name="assigned_to" class="input input-sm w-full" value="{{ obj.assigned_to }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Cost" %}</label>
                <input type="number" name="cost" class="input input-sm w-full" step="0.01" value="{{ obj.cost }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Notes" %}</label>
                <textarea name="notes" class="textarea textarea-sm w-full" rows="3">{{ obj.notes }}</textarea>
                </div>
            </div>
        </div>
    </form>
</div>
